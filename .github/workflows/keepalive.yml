name: Keep Oracle ADB Alive

on:
  schedule:
    - cron: '0 8 */5 * *'   # a cada 5 dias, 8h UTC
  workflow_dispatch:          # permite rodar manualmente pelo GitHub Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ARIA API (mantém conexão Oracle ADB ativa)
        run: |
          curl -f https://aria-api-production.up.railway.app/health
          echo "Oracle ADB ping OK"
